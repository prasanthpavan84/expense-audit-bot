# Testing Configuration Profile
app:
  env: "testing"
  model: "mock"
  mcp_server_port: 8091
  max_iterations: 2
  database_path: ":memory:"

feature_flags:
  planner: true
  reflection: true
  rag: true
  dashboard: true
  auth_enabled: false

rate_limit:
  requests_per_minute: 1000

prompt_versions:
  planner_agent: "v1"
  receipt_agent: "v1"
  fraud_agent: "v1"
  policy_agent: "v1"
  reasoning_agent: "v1"
  reflection_agent: "v1"
  report_agent: "v1"
